name: Validate package.json name and/or version(s)
description: >
  Validates package.json name and/or version. Optionally validates all npm workspaces.

inputs:
  expected_pkg_name:
    description: >
      Expected package.json name. If provided, must match.
    required: false

  expected_pkg_version:
    description: >
      Expected package.json version. If provided, must match.
      May include optional leading 'v' (e.g. v1.2.3).
    required: false

  workspaces:
    description: >
      If "true", validate all npm workspaces using expected_workspaces_versions.
    required: false
    default: "false"

  expected_workspaces_versions:
    description: >
      JSON object mapping workspace package name -> version.
      Required when workspaces="true".
      Example: {"@scope/a":"1.2.3","@scope/b":"4.5.6"}
      Values may include optional leading 'v' (e.g. "v1.2.3").
    required: false
    default: "{}"

  cwd:
    description: >
      Working directory containing package.json (relative to repo root).
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Validate package.json name and/or version(s)
      shell: bash
      run: |
        set -euo pipefail
        node "${GITHUB_ACTION_PATH}/scripts/validate.ts"
      env:
        INPUT_EXPECTED_PKG_NAME: ${{ inputs.expected_pkg_name }}
        INPUT_EXPECTED_PKG_VERSION: ${{ inputs.expected_pkg_version }}
        INPUT_WORKSPACES: ${{ inputs.workspaces }}
        INPUT_EXPECTED_WORKSPACES_VERSIONS: ${{ inputs.expected_workspaces_versions }}
        INPUT_CWD: ${{ inputs.cwd }}
