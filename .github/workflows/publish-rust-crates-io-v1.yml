name: Publish Rust crate to crates.io

on:
  workflow_call:
    inputs:
      crate_name:
        description: "Name of the crate to publish (optional - will publish root package if not specified)"
        required: false
        type: string
      expected_version:
        description: "Expected crate version (optional - if provided, must match the crate's Cargo.toml version)"
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository contents
        uses: actions/checkout@v7

      - name: Uninstall existing Rust toolchain (workaround for some runner images)
        run: rustup toolchain uninstall stable

      - name: Setup Rust toolchain with caching
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Validate input combinations
        if: inputs.expected_version != '' && inputs.crate_name == ''
        run: |
          echo "::error::expected_version requires crate_name to be specified"
          exit 1

      - name: Verify expected version matches crate version
        if: inputs.expected_version != '' && inputs.crate_name != ''
        run: |
          EXPECTED_VERSION="${{ inputs.expected_version }}"
          # Strip leading 'v' if present (e.g., v1.0.0 -> 1.0.0)
          EXPECTED_VERSION="${EXPECTED_VERSION#v}"
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "${{ inputs.crate_name }}") | .version')
          if [ "$EXPECTED_VERSION" != "$CRATE_VERSION" ]; then
            echo "::error::Expected version ($EXPECTED_VERSION) does not match crate version ($CRATE_VERSION)"
            exit 1
          fi

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io (specific crate)
        if: inputs.crate_name != ''
        run: cargo publish --locked -p ${{ inputs.crate_name }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish to crates.io (root package)
        if: inputs.crate_name == ''
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
